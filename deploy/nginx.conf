# Trellis client: SPA + API proxy
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy to the Trellis server (strips the /api prefix, matching the
    # Vite dev proxy behavior)
    location /api/ {
        proxy_pass http://server:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
    }

    # WebSocket subscriptions (the client derives ws://host/ws from its
    # API base URL - this path is NOT under /api)
    location /ws {
        proxy_pass http://server:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
