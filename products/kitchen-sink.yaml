# Kitchen Sink Demo - 2-column layout
name: Kitchen Sink Demo
version: 1.0.0
description: All blocks in usable layout
defaultView: dashboard

entities:
  - id: work_item
    name: Work Item
    properties:
      - name: title
        type: text
      - name: status
        type: option
        options: [todo, in_progress, done]
      - name: priority
        type: option
        options: [low, medium, high]

views:
  - id: dashboard
    name: Dashboard
    route: /
    layout:
      type: stack
      direction: vertical
      gap: 16px
      children:
        # Row 1: Form + Stats side by side
        - type: grid
          columns: 2
          gap: 16px
          rows:
            - cells:
                - block:
                    type: trellis.form
                    id: form
                    props:
                      entityType: work_item
                      mode: create
                      fields:
                        - property: title
                          type: text
                          placeholder: Enter title...
                        - property: status
                          type: select
                          options:
                            - value: todo
                              label: To Do
                            - value: in_progress
                              label: In Progress
                            - value: done
                              label: Done
                        - property: priority
                          type: select
                          options:
                            - value: low
                              label: Low
                            - value: medium
                              label: Medium
                            - value: high
                              label: High
                - block:
                    type: trellis.stats
                    id: stats
                    props:
                      layout: grid
                      columns: 2
                      stats:
                        - label: Total
                          entityType: work_item
                          aggregate: count
                        - label: Done
                          entityType: work_item
                          aggregate: count
                          filter:
                            status: done
                        - label: In Progress
                          entityType: work_item
                          aggregate: count
                          filter:
                            status: in_progress
                        - label: Todo
                          entityType: work_item
                          aggregate: count
                          filter:
                            status: todo

        # Row 2: Table (full width)
        - type: trellis.data-table
          id: items-table
          props:
            entityType: work_item
            compact: true
            columns:
              - property: title
                label: Title
              - property: status
                label: Status
              - property: priority
                label: Priority
            onRowClick: navigate
            rowClickTarget: edit
            actions:
              - type: edit
                label: Edit
              - type: delete
                label: Delete
                confirm: true

        # Row 3: Charts side by side
        - type: grid
          columns: 2
          gap: 16px
          rows:
            - cells:
                - block:
                    type: trellis.chart
                    id: chart-doughnut
                    props:
                      type: doughnut
                      entityType: work_item
                      labelProperty: status
                      aggregate: count
                      title: By Status
                      height: 200
                      showLegend: true
                - block:
                    type: trellis.chart
                    id: chart-bar
                    props:
                      type: bar
                      entityType: work_item
                      labelProperty: priority
                      aggregate: count
                      title: By Priority
                      height: 200
                      showLegend: true

        # Row 4: Kanban (full width)
        - type: trellis.kanban
          id: kanban
          props:
            entityType: work_item
            statusProperty: status
            columns:
              - id: todo
                label: To Do
                value: todo
              - id: in_progress
                label: In Progress
                value: in_progress
              - id: done
                label: Done
                value: done

        # Row 5: Timeline (full width, no detail with hardcoded ID)
        - type: trellis.timeline
          id: timeline
          props:
            entityType: work_item
            timestampProperty: created_at
            titleProperty: title
            limit: 5

        # Row 6: Other blocks
        - type: grid
          columns: 3
          gap: 16px
          rows:
            - cells:
                - block:
                    type: trellis.tree-view
                    id: tree
                    props:
                      entityType: work_item
                      labelProperty: title
                - block:
                    type: trellis.tabs
                    id: tabs
                    props:
                      tabs:
                        - id: tab1
                          label: Info
                          blocks:
                            - type: trellis.stats
                              props:
                                stats:
                                  - label: Items
                                    value: 5
                - block:
                    type: trellis.card
                    id: card1
                    props:
                      title: Mini Chart
                      blocks:
                        - type: trellis.chart
                          props:
                            type: line
                            data:
                              - label: A
                                value: 10
                              - label: B
                                value: 25
                            height: 80

        # Row 7: File blocks + Modal
        - type: grid
          columns: 3
          gap: 16px
          rows:
            - cells:
                - block:
                    type: trellis.file-uploader
                    id: uploader
                    props:
                      accept: "image/*,.pdf"
                      maxFiles: 2
                - block:
                    type: trellis.file-viewer
                    id: viewer
                    props:
                      entityType: work_item
                - block:
                    type: trellis.modal
                    id: modal
                    props:
                      trigger: button
                      triggerLabel: Open Modal
                      title: Example Modal
                      blocks:
                        - type: trellis.stats
                          props:
                            stats:
                              - label: Test
                                value: 42

    wiring: []

  # Edit view
  - id: edit
    name: Edit Item
    route: /edit/:id
    layout:
      type: stack
      direction: vertical
      gap: 16px
      children:
        - type: trellis.form
          id: edit-form
          props:
            entityType: work_item
            entityId: $route.params.id
            mode: edit
            fields:
              - property: title
                type: text
                label: Title
              - property: status
                type: select
                label: Status
                options:
                  - value: todo
                    label: To Do
                  - value: in_progress
                    label: In Progress
                  - value: done
                    label: Done
              - property: priority
                type: select
                label: Priority
                options:
                  - value: low
                    label: Low
                  - value: medium
                    label: Medium
                  - value: high
                    label: High
            actions:
              submit:
                type: submit
                label: Save Changes
                variant: primary
              cancel:
                type: cancel
                label: Cancel

navigation:
  items:
    - label: Dashboard
      view: dashboard
      icon: home
