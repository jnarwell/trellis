# Kitchen Sink Dashboard (server-loadable directory format)
#
# Mirrors the client demo config (products/kitchen-sink.yaml) using the
# layout/block structure the product loader validates. The client runtime
# renders the flat config served by GET /config/products/kitchen-sink; this
# view exists so the directory product loads cleanly via `trellis serve`.

id: dashboard
name: Kitchen Sink Demo
description: All block types over the work_item entity
route: /

layout:
  type: stack
  direction: vertical
  gap: 16px
  blocks:
    - type: trellis.page-header
      id: page-header
      props:
        title: Kitchen Sink Demo
        subtitle: Work item management with all block types

    - type: trellis.form
      id: create-form
      props:
        entityType: work_item
        mode: create
        fields:
          - property: title
            type: text
          - property: status
            type: select
          - property: priority
            type: select

    - type: trellis.stats
      id: stats
      props:
        layout: grid
        columns: 4
        stats:
          - label: Total
            entityType: work_item
            aggregate: count
          - label: Done
            entityType: work_item
            aggregate: count
            filter:
              status: done
          - label: In Progress
            entityType: work_item
            aggregate: count
            filter:
              status: in_progress
          - label: Todo
            entityType: work_item
            aggregate: count
            filter:
              status: todo

    - type: trellis.data-table
      id: items-table
      props:
        entityType: work_item
        columns:
          - property: title
            label: Title
          - property: status
            label: Status
          - property: priority
            label: Priority

    - type: trellis.chart
      id: status-chart
      props:
        type: doughnut
        entityType: work_item
        labelProperty: status
        aggregate: count
        title: By Status

    - type: trellis.kanban
      id: kanban
      props:
        entityType: work_item
        statusProperty: status
        columns:
          - id: todo
            label: To Do
            value: todo
          - id: in_progress
            label: In Progress
            value: in_progress
          - id: done
            label: Done
            value: done

    - type: trellis.timeline
      id: timeline
      props:
        entityType: work_item
        timestampProperty: created_at
        titleProperty: title
        limit: 5

    - type: trellis.tree-view
      id: tree
      props:
        entityType: work_item
        labelProperty: title
